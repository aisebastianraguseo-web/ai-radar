name: Weekly Ingestion

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      source_types:
        description: 'Comma-separated source types to ingest (leave empty for all)'
        required: false
        default: ''

jobs:
  trigger-ingestion:
    name: Trigger ingestion pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Call ingestion trigger API
        run: |
          BODY="{}"
          if [ -n "${{ github.event.inputs.source_types }}" ]; then
            BODY=$(echo '{"source_types": $SOURCE_TYPES}' | \
              jq --argjson SOURCE_TYPES \
              "$(echo '${{ github.event.inputs.source_types }}' | \
              jq -R 'split(\",\") | map(ltrimstr(\" \") | rtrimstr(\" \"))')" '.')
          fi

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "${{ secrets.APP_URL }}/api/admin/ingest/trigger")

          echo "Response: $(cat /tmp/response.json)"
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Ingestion trigger failed with HTTP $HTTP_STATUS"
            exit 1
          fi
