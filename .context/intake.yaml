# =============================================================================
# ADDITIONAL NOTES & CONTEXT
# =============================================================================

notes: |
    ### Strategic Context
    AI is transitioning from hype to operational infrastructure in 2026. This platform exists to help enterprises 
    distinguish genuine capability advances (that enable new automation, cost reduction, or decision-making) 
    from marketing noise. The core value is in **mapping** (capability → business problem) and **timing** 
    (alerting when a problem becomes newly solvable).

    ### Key Design Decisions
    1. **Dual-layer ingestion**: Official channels (high-trust, lower volume) + weak signals (GitHub, ArXiv, 
       community) provide breadth and novelty detection.
    2. **LLM-powered extraction**: Rather than regex/heuristics, we use Claude/GPT to reason about capability 
       deltas, reducing manual taxonomy updates.
    3. **Business impact first**: A capability is only interesting if it solves a *known* business problem 
       (fragmentation, repetitivity, etc.). This prevents rabbit holes.
    4. **Scoring discipline**: The Disruption Scorecard quantifies impact, reducing subjective "is this important?" 
       debates. Thresholds filter noise.
    5. **Weekly cadence**: Not real-time (overkill for most use cases), not quarterly (too stale). Weekly 
       briefings balance timeliness with signal clarity.

    ### Open Questions (To Be Resolved in Discovery Phase)
    - Pricing model: Per-user? Per-org? Freemium?
    - Geographic expansion: Start EU-only (GDPR compliance) or global?
    - Vertical focus: Generic (all industries) or vertical-specific (finance, healthcare, etc.)?
    - White-label potential: Early, or post-MVP?
    - Community features: Shared insights, crowd-sourced signals? (later phase)

    ### Known Vendor Landscape
    - Official sources monitored: OpenAI, Google DeepMind (Gemini), Anthropic (Claude), AWS, Microsoft, Meta, NVIDIA, 
      Mistral, Cohere, xAI, Perplexity, Apple (MLX), Chinese vendors (Baidu Ernie, Alibaba Qwen, DeepSeek).
    - Key recent capability shifts (Feb 2026 snapshot):
      * Google: Computer Use tool (screen control)
      * Anthropic: Memory tool, context editing, Claude Sonnet 4.6
      * Mistral: Voxtral Transcribe 2 (voice with diarization)
      * NVIDIA: Blackwell Ultra GPUs (35x cost reduction)
      * Apple: On-device foundation models (3B params, multimodal)

    ### Technology Philosophy
    - Serverless-first (AWS Lambda, Vercel): Lower ops overhead for early-stage
    - LLM-native: Lean into structured output, prompting discipline
    - Open standards: PostgreSQL, REST APIs (avoid vendor lock-in)
    - Progressive enhancement: MVP with polling; later, real-time via webhooks

    ### Competitive Landscape
    - No direct competitor doing exactly this (capability mapping + business problem synthesis)
    - Closest: AI conference coverage (Lenny's List), VC blogs (a16z), newsletters (The Batch, Import AI)
    - Differentiation: Automated, structured, business-focused (not researcher-focused)

    ### Legal / Compliance Considerations
    - Data processing: Only *public* sources; no proprietary training data
    - LLM privacy: Use enterprise API instances; no data retention
    - GDPR: EU data residency, DPA with cloud vendors
    - SOC2/ISO27001: Target by GA (Q1 2027)

    ### Customer Personas & Use Cases
    1. **Enterprise AI/Strategy Lead**: "Is this disruption relevant to our 5-year roadmap?"
    2. **Product Manager (Automation)**: "Can we use this new capability to unlock a faster feature?"
    3. **Business Automation Manager**: "Our current invoice extraction is 80% accurate. Can this new LLM improve it?"

    ### Feedback Incorporation Loop
    - Beta phase (Aug 2026): 5-10 pilot customers provide weekly feedback
    - Iterate: Refine problem matrix, improve LLM prompts, adjust scorecard weights
    - Public launch (Feb 2027): Based on learning, finalize product positioning and pricing
